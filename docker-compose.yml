version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: voyageiq-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: voyageiq_secure_pass
      MYSQL_DATABASE: voyageiq
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voyageiq-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql-db
      DB_USER: root
      DB_PASSWORD: voyageiq_secure_pass
      DB_NAME: voyageiq
      JWT_SECRET: voyageiq_super_secret_jwt_key_987654321_abcdef
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      - mysql-db

  dashboard-panel:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: voyageiq-dashboard
    restart: always
    ports:
      - "8001:8001"
    environment:
      DB_HOST: mysql-db
      DB_USER: root
      DB_PASSWORD: voyageiq_secure_pass
      DB_NAME: voyageiq
      JWT_SECRET: voyageiq_super_secret_jwt_key_987654321_abcdef
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      - mysql-db

  admin-panel:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: voyageiq-admin
    restart: always
    ports:
      - "8002:8002"
    environment:
      DB_HOST: mysql-db
      DB_USER: root
      DB_PASSWORD: voyageiq_secure_pass
      DB_NAME: voyageiq
      JWT_SECRET: voyageiq_super_secret_jwt_key_987654321_abcdef
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      - mysql-db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voyageiq-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend-api

volumes:
  mysql-data:
